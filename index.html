<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurniSketch Pro 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: white; overflow: hidden; margin: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .gradient-text { background: linear-gradient(135deg, #e94560, #ff6b6b, #feca57); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #ff6b6b); border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: scale(1.05); }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 10px; width: 100%; outline: none; }
        .material-btn { width: 50px; height: 50px; border-radius: 10px; border: 3px solid transparent; cursor: pointer; position: relative; }
        .material-btn.active { border-color: #e94560; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
        .color-btn.active { border-color: white; transform: scale(1.2); }
        .room-btn { padding: 8px 16px; border-radius: 8px; border: none; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); cursor: pointer; font-weight: 600; }
        .room-btn.active { background: linear-gradient(135deg, #e94560, #ff6b6b); color: white; }
        .furniture-item { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .furniture-item:hover { background: rgba(255,255,255,0.1); }
        .furniture-item.active { border-color: #e94560; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(0,0,0,0.9); color: white; padding: 15px 30px; border-radius: 12px; font-weight: 600; z-index: 1000; transition: all 0.5s; border: 1px solid #e94560; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        #canvas-container { width: 100%; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }
        .sidebar { width: 300px; height: 100vh; overflow-y: auto; background: rgba(10,10,10,0.9); position: fixed; top: 0; z-index: 10; padding: 16px; }
        .sidebar-left { right: 0; border-left: 1px solid rgba(255,255,255,0.1); }
        .sidebar-right { left: 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .dimension-slider { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); outline: none; -webkit-appearance: none; }
        .dimension-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #e94560; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading-screen" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="mt-4 text-gray-400">جاري تحميل المصمم ثلاثي الأبعاد...</p>
    </div>

    <!-- Right Sidebar -->
    <div class="sidebar sidebar-right">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 to-orange-400 flex items-center justify-center text-xl font-bold">F</div>
            <div>
                <h1 class="text-lg font-bold gradient-text">FurniSketch</h1>
                <p class="text-xs text-gray-500">Pro 3D</p>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">🏠 اختاري الغرفة</h3>
            <div class="flex flex-wrap gap-2">
                <button onclick="setRoom('bedroom')" id="room-bedroom" class="room-btn active">🛏️ نوم</button>
                <button onclick="setRoom('living')" id="room-living" class="room-btn">🛋️ معيشة</button>
                <button onclick="setRoom('kitchen')" id="room-kitchen" class="room-btn">🍳 مطبخ</button>
                <button onclick="setRoom('dining')" id="room-dining" class="room-btn">🍽️ سفرة</button>
                <button onclick="setRoom('office')" id="room-office" class="room-btn">📚 مكتب</button>
                <button onclick="setRoom('bathroom')" id="room-bathroom" class="room-btn">🚿 حمام</button>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">🪑 الأثاث</h3>
            <div id="furniture-list"></div>
        </div>

        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">✨ وصف ذكي</h3>
            <textarea id="desc-input" class="input-field text-sm mb-2" rows="2" placeholder="مثال: كنبة زاوية حديثة..."></textarea>
            <button onclick="generateFromDesc()" class="btn-primary w-full text-sm">
                <i class="fas fa-magic ml-2"></i>ولد التصميم
            </button>
        </div>
    </div>

    <!-- Left Sidebar -->
    <div class="sidebar sidebar-left">
        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">📋 القطعة المختارة</h3>
            <div id="selected-info" class="text-sm text-gray-300">
                <p>اختاري قطعة من القايمة</p>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">🪵 الخامة</h3>
            <div class="flex flex-wrap gap-2">
                <button onclick="setMat('oak')" id="mat-oak" class="material-btn active" style="background: linear-gradient(135deg, #8B6914, #A0522D);"></button>
                <button onclick="setMat('walnut')" id="mat-walnut" class="material-btn" style="background: linear-gradient(135deg, #5C4033, #3D2B1F);"></button>
                <button onclick="setMat('mdf')" id="mat-mdf" class="material-btn" style="background: linear-gradient(135deg, #F5DEB3, #D2B48C);"></button>
                <button onclick="setMat('metal')" id="mat-metal" class="material-btn" style="background: linear-gradient(135deg, #C0C0C0, #808080);"></button>
                <button onclick="setMat('leather')" id="mat-leather" class="material-btn" style="background: linear-gradient(135deg, #8B4513, #CD853F);"></button>
                <button onclick="setMat('fabric')" id="mat-fabric" class="material-btn" style="background: linear-gradient(135deg, #800080, #4B0082);"></button>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">🎨 اللون</h3>
            <div class="flex flex-wrap gap-2">
                <button onclick="setCol('#8B4513')" id="col-1" class="color-btn active" style="background: #8B4513;"></button>
                <button onclick="setCol('#D2691E')" id="col-2" class="color-btn" style="background: #D2691E;"></button>
                <button onclick="setCol('#F5DEB3')" id="col-3" class="color-btn" style="background: #F5DEB3;"></button>
                <button onclick="setCol('#2F4F4F')" id="col-4" class="color-btn" style="background: #2F4F4F;"></button>
                <button onclick="setCol('#708090')" id="col-5" class="color-btn" style="background: #708090;"></button>
                <button onclick="setCol('#000000')" id="col-6" class="color-btn" style="background: #000000;"></button>
                <button onclick="setCol('#FFFFFF')" id="col-7" class="color-btn" style="background: #FFFFFF; border: 2px solid rgba(255,255,255,0.3);"></button>
                <button onclick="setCol('#800080')" id="col-8" class="color-btn" style="background: #800080;"></button>
                <button onclick="setCol('#FF6347')" id="col-9" class="color-btn" style="background: #FF6347;"></button>
                <button onclick="setCol('#4169E1')" id="col-10" class="color-btn" style="background: #4169E1;"></button>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="text-sm font-bold mb-3 text-gray-400">📐 المقاسات</h3>
            <div class="mb-2">
                <label class="text-xs text-gray-500">الطول</label>
                <input type="range" id="dim-l" class="dimension-slider" min="50" max="300" value="200" oninput="updateDim()">
                <span id="val-l" class="text-xs text-gray-400">200</span>
            </div>
            <div class="mb-2">
                <label class="text-xs text-gray-500">العرض</label>
                <input type="range" id="dim-w" class="dimension-slider" min="50" max="200" value="90" oninput="updateDim()">
                <span id="val-w" class="text-xs text-gray-400">90</span>
            </div>
            <div>
                <label class="text-xs text-gray-500">الارتفاع</label>
                <input type="range" id="dim-h" class="dimension-slider" min="30" max="250" value="85" oninput="updateDim()">
                <span id="val-h" class="text-xs text-gray-400">85</span>
            </div>
        </div>

        <div class="flex flex-col gap-2">
            <button onclick="deleteSel()" class="btn-secondary text-sm">🗑️ حذف</button>
            <button onclick="clearRoom()" class="btn-secondary text-sm">🧹 مسح الغرفة</button>
            <button onclick="saveDesign()" class="btn-primary text-sm">💾 حفظ</button>
            <button onclick="exportDesign()" class="btn-primary text-sm" style="background: linear-gradient(135deg, #00d2ff, #3a7bd5);">📥 تصدير</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let scene, camera, renderer, controls, raycaster, mouse;
        let selectedObj = null, furnitureObjs = [];
        let currentRoom = 'bedroom', currentMat = 'oak', currentCol = '#8B4513';
        
        const rooms = {
            bedroom: { name: 'غرفة نوم', floor: 0x8B7355, wall: 0xF5F5DC, w: 12, d: 10, h: 3,
                items: [{t:'bed',n:'سرير',x:0,z:-2,r:0},{t:'wardrobe',n:'دولاب',x:-4,z:-4,r:0},{t:'nightstand',n:'كومودينو',x:-2.5,z:-1,r:0},{t:'nightstand',n:'كومودينو',x:2.5,z:-1,r:0},{t:'dresser',n:'تسريحة',x:4,z:-4,r:0}] },
            living: { name: 'صالون', floor: 0xA0522D, wall: 0xFFF8DC, w: 14, d: 12, h: 3,
                items: [{t:'sofa',n:'كنبة',x:0,z:2,r:0},{t:'sofa',n:'كنبة زاوية',x:-3,z:2,r:1.57},{t:'table',n:'ترابيزة',x:0,z:0,r:0},{t:'tvstand',n:'تلفزيون',x:0,z:-4,r:0},{t:'bookshelf',n:'رفوف',x:5,z:-3,r:0}] },
            kitchen: { name: 'مطبخ', floor: 0x696969, wall: 0xF0F8FF, w: 10, d: 10, h: 3,
                items: [{t:'kitchen_cabinet',n:'وحدات',x:-3,z:-4,r:0},{t:'kitchen_counter',n:'رخامة',x:0,z:-4,r:0},{t:'fridge',n:'ثلاجة',x:3,z:-4,r:0},{t:'dining_table',n:'ترابيزة',x:0,z:2,r:0},{t:'chair',n:'كرسي',x:-1.5,z:2,r:0},{t:'chair',n:'كرسي',x:1.5,z:2,r:0}] },
            dining: { name: 'سفرة', floor: 0x8B4513, wall: 0xFFFAF0, w: 10, d: 10, h: 3,
                items: [{t:'dining_table',n:'ترابيزة',x:0,z:0,r:0},{t:'chair',n:'كرسي',x:-2,z:0,r:0},{t:'chair',n:'كرسي',x:2,z:0,r:3.14},{t:'chair',n:'كرسي',x:0,z:-2,r:1.57},{t:'chair',n:'كرسي',x:0,z:2,r:-1.57},{t:'sideboard',n:'بوفيه',x:4,z:-4,r:0}] },
            office: { name: 'مكتب', floor: 0x556B2F, wall: 0xF5F5F0, w: 10, d: 10, h: 3,
                items: [{t:'desk',n:'مكتب',x:0,z:-2,r:0},{t:'office_chair',n:'كرسي',x:0,z:0,r:3.14},{t:'bookshelf',n:'رفوف',x:-4,z:-4,r:0},{t:'cabinet',n:'خزانة',x:4,z:-4,r:0}] },
            bathroom: { name: 'حمام', floor: 0x4682B4, wall: 0xF0F8FF, w: 6, d: 8, h: 3,
                items: [{t:'bathtub',n:'بانيو',x:-2,z:-3,r:0},{t:'sink',n:'حوض',x:2,z:-3,r:0},{t:'toilet',n:'مرحاض',x:2,z:2,r:3.14},{t:'mirror',n:'مرآة',x:2,z:-3.5,r:0}] }
        };

        const furnTypes = {
            bedroom: [{t:'bed',n:'سرير',i:'🛏️'},{t:'wardrobe',n:'دولاب',i:'🚪'},{t:'nightstand',n:'كومودينو',i:'📦'},{t:'dresser',n:'تسريحة',i:'💄'},{t:'mirror',n:'مرآة',i:'🪞'}],
            living: [{t:'sofa',n:'كنبة',i:'🛋️'},{t:'armchair',n:'كرسي',i:'🪑'},{t:'table',n:'ترابيزة',i:'🪑'},{t:'tvstand',n:'تلفزيون',i:'📺'},{t:'bookshelf',n:'رفوف',i:'📚'},{t:'rug',n:'سجادة',i:'🧶'}],
            kitchen: [{t:'kitchen_cabinet',n:'وحدات',i:'🗄️'},{t:'kitchen_counter',n:'رخامة',i:'🪨'},{t:'fridge',n:'ثلاجة',i:'❄️'},{t:'stove',n:'بوتجاز',i:'🔥'},{t:'sink',n:'حوض',i:'💧'},{t:'dining_table',n:'ترابيزة',i:'🪑'},{t:'chair',n:'كرسي',i:'🪑'}],
            dining: [{t:'dining_table',n:'ترابيزة',i:'🪑'},{t:'chair',n:'كرسي',i:'🪑'},{t:'sideboard',n:'بوفيه',i:'🗄️'},{t:'chandelier',n:'نجفة',i:'💡'}],
            office: [{t:'desk',n:'مكتب',i:'📝'},{t:'office_chair',n:'كرسي',i:'💺'},{t:'bookshelf',n:'رفوف',i:'📚'},{t:'cabinet',n:'خزانة',i:'🗄️'},{t:'lamp',n:'مصباح',i:'💡'}],
            bathroom: [{t:'bathtub',n:'بانيو',i:'🛁'},{t:'sink',n:'حوض',i:'💧'},{t:'toilet',n:'مرحاض',i:'🚽'},{t:'mirror',n:'مرآة',i:'🪞'},{t:'cabinet',n:'خزانة',i:'🗄️'}]
        };

        const mats = { oak:0x8B6914, walnut:0x5C4033, mdf:0xF5DEB3, metal:0xC0C0C0, leather:0x8B4513, fabric:0x800080 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);
            
            renderer = new THREE.WebGLRenderer({antialias:true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxPolarAngle = Math.PI/2.2;
            controls.minDistance = 3;
            controls.maxDistance = 20;
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const dl = new THREE.DirectionalLight(0xffffff, 0.8);
            dl.position.set(5, 10, 5); dl.castShadow = true;
            scene.add(dl);
            scene.add(new THREE.PointLight(0xffaa00, 0.3, 20));
            
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            loadRoom('bedroom');
            updateList();
            
            renderer.domElement.addEventListener('click', onClick);
            window.addEventListener('resize', onResize);
            animate();
            
            setTimeout(() => document.getElementById('loading-screen').style.display='none', 1000);
        }

        function createRoom(key) {
            const r = rooms[key];
            const g = new THREE.Group();
            g.name = 'room';
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(r.w, r.d), new THREE.MeshStandardMaterial({color:r.floor, roughness:0.8}));
            floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
            g.add(floor);
            
            const wm = new THREE.MeshStandardMaterial({color:r.wall, roughness:0.9});
            const bw = new THREE.Mesh(new THREE.PlaneGeometry(r.w, r.h), wm);
            bw.position.set(0, r.h/2, -r.d/2); bw.receiveShadow = true; g.add(bw);
            
            const lw = new THREE.Mesh(new THREE.PlaneGeometry(r.d, r.h), wm);
            lw.position.set(-r.w/2, r.h/2, 0); lw.rotation.y = Math.PI/2; lw.receiveShadow = true; g.add(lw);
            
            const rw = new THREE.Mesh(new THREE.PlaneGeometry(r.d, r.h), wm);
            rw.position.set(r.w/2, r.h/2, 0); rw.rotation.y = -Math.PI/2; rw.receiveShadow = true; g.add(rw);
            
            scene.add(g);
        }

        function loadRoom(key) {
            currentRoom = key;
            furnitureObjs.forEach(o => scene.remove(o));
            furnitureObjs = []; selectedObj = null;
            
            const old = scene.getObjectByName('room');
            if(old) scene.remove(old);
            
            createRoom(key);
            rooms[key].items.forEach(i => createFurn(i.t, i.n, i.x, i.z, i.r));
            updateInfo();
        }

        function getMat() {
            const c = new THREE.Color(currentCol);
            let rough = 0.8;
            return new THREE.MeshStandardMaterial({color:c, roughness:rough, metalness:0});
        }

        function createFurn(type, name, x, z, rot) {
            const g = new THREE.Group();
            g.userData = {isFurn:true, type, name, mat:currentMat, col:currentCol};
            const m = getMat();
            
            switch(type) {
                case 'bed':
                    const mattress = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 2.8), m);
                    mattress.position.y = 0.5; mattress.castShadow = true; g.add(mattress);
                    const headboard = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.2, 0.2), m);
                    headboard.position.set(0, 1, -1.4); headboard.castShadow = true; g.add(headboard);
                    [[-0.9,-1.3],[0.9,-1.3],[-0.9,1.3],[0.9,1.3]].forEach(p => {
                        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.5), new THREE.MeshStandardMaterial({color:0x333333}));
                        leg.position.set(p[0], 0.25, p[1]); g.add(leg);
                    });
                    break;
                case 'sofa':
                    const base = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.5, 0.9), m);
                    base.position.y = 0.25; base.castShadow = true; g.add(base);
                    const back = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 0.2), m);
                    back.position.set(0, 0.9, -0.35); back.castShadow = true; g.add(back);
                    const armGeo = new THREE.BoxGeometry(0.2, 0.6, 0.9);
                    const arm1 = new THREE.Mesh(armGeo, m); arm1.position.set(-1.1, 0.55, 0); arm1.castShadow = true; g.add(arm1);
                    const arm2 = new THREE.Mesh(armGeo, m); arm2.position.set(1.1, 0.55, 0); arm2.castShadow = true; g.add(arm2);
                    for(let i=-1; i<=1; i++) {
                        const cushion = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.5), m);
                        cushion.position.set(i*0.7, 0.6, 0.1); g.add(cushion);
                    }
                    break;
                case 'wardrobe':
                    const wbody = new THREE.Mesh(new THREE.BoxGeometry(2, 2.2, 0.6), m);
                    wbody.position.y = 1.1; wbody.castShadow = true; g.add(wbody);
                    const doorGeo = new THREE.BoxGeometry(0.95, 2.1, 0.05);
                    const d1 = new THREE.Mesh(doorGeo, m); d1.position.set(-0.48, 1.1, 0.32); g.add(d1);
                    const d2 = new THREE.Mesh(doorGeo, m); d2.position.set(0.48, 1.1, 0.32); g.add(d2);
                    const hGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.15);
                    const hMat = new THREE.MeshStandardMaterial({color:0xC0C0C0, metalness:0.8});
                    const h1 = new THREE.Mesh(hGeo, hMat); h1.position.set(-0.2, 1.1, 0.35); g.add(h1);
                    const h2 = new THREE.Mesh(hGeo, hMat); h2.position.set(0.2, 1.1, 0.35); g.add(h2);
                    break;
                case 'table':
                case 'dining_table':
                    const top = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, 0.8), m);
                    top.position.y = 0.75; top.castShadow = true; g.add(top);
                    const tlegGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.75);
                    [[-0.65,-0.35],[0.65,-0.35],[-0.65,0.35],[0.65,0.35]].forEach(p => {
                        const leg = new THREE.Mesh(tlegGeo, m); leg.position.set(p[0], 0.375, p[1]); leg.castShadow = true; g.add(leg);
                    });
                    break;
                case 'chair':
                case 'office_chair':
                    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.5), m);

                    break;
                case 'dresser':
                    const dbody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.4), m);
                    dbody.position.y = 0.4; dbody.castShadow = true; g.add(dbody);
                    const dm = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 0.05), new THREE.MeshStandardMaterial({color:0xE0E0E0, metalness:0.9, roughness:0.1}));
                    dm.position.set(0, 1.2, -0.15); g.add(dm);
                    break;
                case 'tvstand':
                    const tvbody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 0.4), m);
                    tvbody.position.y = 0.25; tvbody.castShadow = true; g.add(tvbody);

                    tv.position.set(0, 1.1, 0); g.add(tv);

                case 'bookshelf':

                    const sink = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.4), new THREE.MeshStandardMaterial({color:0xC0C0C0, metalness:0.8}));

                    break;
                case 'sideboard':
                    const sb = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.9, 0.45), m);
                    sb.position.y = 0.45; sb.castShadow = true; g.add(sb);
                    for(let i=0; i<<3; i++) {
                        const sdrawer = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.05), m);

                    }
                    break;
                case 'bathtub':
                    const tub = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 0.8), new THREE.MeshStandardMaterial({color:0xFFFFFF, roughness:0.1}));
                    tub.position.y = 0.3; tub.castShadow = true; g.add(tub);
                    const water = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.05, 0.7), new THREE.MeshStandardMaterial({color:0x87CEEB, transparent:true, opacity:0.6}));
                    water.position.y = 0.45; g.add(water);
                    const faucet = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3), new THREE.MeshStandardMaterial({color:0xC0C0C0, metalness:0.8}));

                    break;
                case 'sink':
                    const sbase = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.5), m);
                    sbase.position.y = 0.4; g.add(sbase);
                    const basin = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.4), new THREE.MeshStandardMaterial({color:0xFFFFFF, roughness:0.1}));
                    basin.position.y = 0.85; g.add(basin);
                    const sf = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2), new THREE.MeshStandardMaterial({color:0xC0C0C0, metalness:0.8}));
                    sf.position.set(0, 1, -0.2); g.add(sf);
                    const sm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.02), new THREE.MeshStandardMaterial({color:0xE0E0E0, metalness:0.9}));
                    sm.position.set(0, 1.5, -0.26); g.add(sm);
                    break;
                case 'toilet':
                    const tbowl = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 0.4), new THREE.MeshStandardMaterial({color:0xFFFFFF, roughness:0.1}));
                    tbowl.position.y = 0.4; g.add(tbowl);
                    const ttank = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.15), new THREE.MeshStandardMaterial({color:0xFFFFFF, roughness:0.1}));
                    ttank.position.set(0, 0.8, -0.2); g.add(ttank);
                    const tseat = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.05), new THREE.MeshStandardMaterial({color:0xFFFFFF, roughness:0.1}));
                    tseat.position.y = 0.62; g.add(tseat);
                    break;
                case 'mirror':
                    const mframe = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.05), m);
                    mframe.position.y = 1.2; g.add(mframe);
                    const mglass = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.02), new THREE.MeshStandardMaterial({color:0xE0E0E0, metalness:0.9, roughness:0.1}));
                    mglass.position.y = 1.2; g.add(mglass);
                    break;
                case 'rug':
                    const rug = new THREE.Mesh(new THREE.BoxGeometry(2, 0.02, 1.5), new THREE.MeshStandardMaterial({color:0x8B0000, roughness:1}));
                    rug.position.y = 0.01; rug.receiveShadow = true; g.add(rug);
                    break;
                case 'chandelier':
                case 'lamp':
                    const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.5), new THREE.MeshStandardMaterial({color:0x333333}));
                    cord.position.y = 2.5; g.add(cord);
                    const shade = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.3, 8, 1, true), new THREE.MeshStandardMaterial({color:0xFFF8DC, transparent:true, opacity:0.8, side:THREE.DoubleSide}));
                    shade.position.y = 2.2; g.add(shade);
                    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshStandardMaterial({color:0xFFFFE0, emissive:0xFFFFE0, emissiveIntensity:0.5}));
                    bulb.position.y = 2.1; g.add(bulb);

                    llight.position.y = 2; g.add(llight);
                    break;
                case 'stove':
                    const stbody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.6), new THREE.MeshStandardMaterial({color:0x333333, metalness:0.5}));
                    stbody.position.y = 0.45; g.add(stbody);
                    for(let i=0; i<<4; i++) {
                        const burner = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.02), new THREE.MeshStandardMaterial({color:0x111111}));
                        burner.position.set((i%2===0?-0.15:0.15), 0.91, (i<<2?-0.15:0.15)); g.add(burner);
                    }
                    const stdoor = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.02), new THREE.MeshStandardMaterial({color:0x111111, metalness:0.3}));
                    stdoor.position.set(0, 0.4, 0.31); g.add(stdoor);
                    break;
                case 'cabinet':
                    const cbody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), m);
                    cbody.position.y = 0.6; cbody.castShadow = true; g.add(cbody);
                    const cdrawer = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.35, 0.05), m);
                    cdrawer.position.set(0, 0.9, 0.22); g.add(cdrawer);
                    const cdoor = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.7, 0.05), m);
                    cdoor.position.set(0, 0.4, 0.22); g.add(cdoor);
                    break;
                case 'armchair':
                    const abase = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.8), m);
                    abase.position.y = 0.25; abase.castShadow = true; g.add(abase);
                    const aback = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.1), m);
                    aback.position.set(0, 0.8, -0.35); aback.castShadow = true; g.add(aback);
                    const aarmGeo = new THREE.BoxGeometry(0.1, 0.4, 0.8);
                    const aarm1 = new THREE.Mesh(aarmGeo, m); aarm1.position.set(-0.4, 0.7, 0); g.add(aarm1);
                    const aarm2 = new THREE.Mesh(aarmGeo, m); aarm2.position.set(0.4, 0.7, 0); g.add(aarm2);
                    break;
                default:
                    const def = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), m);
                    def.position.y = 0.5; def.castShadow = true; g.add(def);
            }
            
            g.position.set(x, 0, z);
            g.rotation.y = rot;
            g.castShadow = true;
            scene.add(g);
            furnitureObjs.push(g);
            return g;
        }

        function onClick(event) {
            mouse.x = (event.clientX/window.innerWidth)*2-1;
            mouse.y = -(event.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(furnitureObjs, true);
            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.isFurn) obj = obj.parent;
                if(obj.userData.isFurn) selectObj(obj);
            } else {
                deselectObj();
            }
        }

        function selectObj(obj) {
            deselectObj();
            selectedObj = obj;
            obj.traverse(child => {
                if(child.isMesh && child.material.emissive) {
                    child.userData.origEmissive = child.material.emissive.clone();
                    child.material.emissive.setHex(0x444444);
                }
            });
            updateInfo();
        }

        function deselectObj() {
            if(selectedObj) {
                selectedObj.traverse(child => {
                    if(child.isMesh && child.userData.origEmissive) {
                        child.material.emissive.copy(child.userData.origEmissive);
                    }
                });
                selectedObj = null;
                updateInfo();
            }
        }

        function updateInfo() {
            const info = document.getElementById('selected-info');
            if(selectedObj) {
                info.innerHTML = `<p><strong>${selectedObj.userData.name}</strong></p><p>الخامة: ${selectedObj.userData.mat}</p><p>اللون: <span style="display:inline-block;width:20px;height:20px;background:${selectedObj.userData.col};border-radius:3px;vertical-align:middle;"></span></p>`;
            } else {
                info.innerHTML = '<p>اختاري قطعة من القايمة أو اضغطي على أي قطعة</p>';
            }
        }

        function updateList() {
            const list = document.getElementById('furniture-list');
            const items = furnTypes[currentRoom] || [];
            list.innerHTML = items.map(item => `
                <div class="furniture-item" onclick="addFurn('${item.t}', '${item.n}')">
                    <span class="text-xl">${item.i}</span>
                    <span>${item.n}</span>
                </div>
            `).join('');
        }

        function addFurn(type, name) {
            const r = rooms[currentRoom];
            const x = (Math.random()-0.5)*r.w*0.6;
            const z = (Math.random()-0.5)*r.d*0.6;
            const obj = createFurn(type, name, x, z, 0);
            selectObj(obj);
            showToast(`تمت إضافة ${name}!`);
        }

        function setRoom(room) {
            document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('room-'+room).classList.add('active');
            loadRoom(room);
            updateList();
            showToast(rooms[room].name);
        }

        function setMat(mat) {
            currentMat = mat;
            document.querySelectorAll('.material-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mat-'+mat).classList.add('active');
            if(selectedObj) {
                applyMat(selectedObj);
                selectedObj.userData.mat = mat;
                updateInfo();
            }
        }

        function setCol(col) {
            currentCol = col;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(selectedObj) {
                applyMat(selectedObj);
                selectedObj.userData.col = col;
                updateInfo();
            }
        }

        function applyMat(obj) {
            const m = getMat();
            obj.traverse(child => {
                if(child.isMesh && !child.userData.isAccent) {
                    child.material = m.clone();
                }
            });
        }

        function updateDim() {
            const l = document.getElementById('dim-l').value;
            const w = document.getElementById('dim-w').value;
            const h = document.getElementById('dim-h').value;
            document.getElementById('val-l').textContent = l;
            document.getElementById('val-w').textContent = w;
            document.getElementById('val-h').textContent = h;
            if(selectedObj) {
                selectedObj.scale.set(l/200, h/85, w/90);
            }
        }

        function deleteSel() {
            if(selectedObj) {
                scene.remove(selectedObj);
                furnitureObjs = furnitureObjs.filter(o => o !== selectedObj);
                selectedObj = null;
                updateInfo();
                showToast('تم الحذف!');
            }
        }

        function clearRoom() {
            furnitureObjs.forEach(o => scene.remove(o));
            furnitureObjs = [];
            selectedObj = null;
            updateInfo();
            showToast('تم مسح الغرفة!');
        }

        function saveDesign() {
            const design = {room:currentRoom, items:furnitureObjs.map(o => ({t:o.userData.type, n:o.userData.name, x:o.position.x, z:o.position.z, r:o.rotation.y, m:o.userData.mat, c:o.userData.col}))};
            localStorage.setItem('fs_design_'+Date.now(), JSON.stringify(design));
            showToast('تم الحفظ! 💾');
        }

        function exportDesign() {
            let report = `تقرير تصميم ${rooms[currentRoom].name}\\n`;
            report += `التاريخ: ${new Date().toLocaleString('ar-EG')}\\n\\n`;
            report += `القطع:\\n`;
            furnitureObjs.forEach((o, i) => {
                report += `${i+1}. ${o.userData.name} - ${o.userData.mat} - ${o.userData.col}\\n`;
            });
            alert(report);
        }

        function generateFromDesc() {
            const desc = document.getElementById('desc-input').value.trim().toLowerCase();
            if(!desc) { showToast('اكتبي وصف!'); return; }
            const keywords = {'سرير':'bed','bed':'bed','كنبة':'sofa','sofa':'sofa','دولاب':'wardrobe','ترابيزة':'table','table':'table','كرسي':'chair','chair':'chair','مكتب':'desk','desk':'desk','رف':'bookshelf','ثلاجة':'fridge','fridge':'fridge','بانيو':'bathtub','bathtub':'bathtub','حوض':'sink','sink':'sink','مرحاض':'toilet','toilet':'toilet'};
            let matched = null;
            for(const [k,v] of Object.entries(keywords)) {
                if(desc.includes(k)) { matched = v; break; }
            }
            if(matched) {
                const r = rooms[currentRoom];
                const obj = createFurn(matched, matched, (Math.random()-0.5)*r.w*0.4, (Math.random()-0.5)*r.d*0.4, 0);
                selectObj(obj);
                showToast('تم الإنشاء! ✨');
            } else {
                showToast('جربي: سرير، كنبة، دولاب، ترابيزة...');
            }
            document.getElementById('desc-input').value = '';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function onResize() {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
